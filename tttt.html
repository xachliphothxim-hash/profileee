```javascript
const cursorLight = document.getElementById("cursorLight");
const card = document.getElementById("card");
const rope = document.getElementById("rope");

let dragging = false;
let offsetX = 0;
let offsetY = 0;

// แสงและสีในตัวอักษรเคลื่อนตามเมาส์
document.addEventListener("mousemove", (e) => {

    cursorLight.style.left = e.clientX + "px";
    cursorLight.style.top = e.clientY + "px";

    const x = (e.clientX / window.innerWidth) * 100;
    const y = (e.clientY / window.innerHeight) * 100;

    document.querySelectorAll(".word").forEach(word => {

        word.style.background =
        `radial-gradient(circle at ${x}% ${y}%,
        #ffffff 0%,
        #e5e5e5 20%,
        #9a9a9a 45%,
        #4d4d4d 70%,
        #000000 100%)`;

        word.style.webkitBackgroundClip = "text";
        word.style.backgroundClip = "text";
        word.style.color = "transparent";

    });

    // ถ้ากำลังลากป้าย ให้เชือกขยับตาม
    if (dragging) {

        const left = e.clientX - offsetX;
        const top = e.clientY - offsetY;

        card.style.left = left + "px";
        card.style.top = top + "px";
        card.style.transform = "none";

        rope.style.left = (left + card.offsetWidth / 2) + "px";
        rope.style.height = Math.max(40, top) + "px";
    }
});

// เริ่มลาก
card.addEventListener("mousedown", (e) => {

    dragging = true;

    offsetX = e.clientX - card.offsetLeft;
    offsetY = e.clientY - card.offsetTop;

    card.style.cursor = "grabbing";

});

// ปล่อยเมาส์
document.addEventListener("mouseup", () => {

    dragging = false;
    card.style.cursor = "grab";

});

/* รองรับการลากบนมือถือ */

card.addEventListener("touchstart", (e) => {

    dragging = true;

    offsetX = e.touches[0].clientX - card.offsetLeft;
    offsetY = e.touches[0].clientY - card.offsetTop;

}, { passive: true });

document.addEventListener("touchmove", (e) => {

    if (!dragging) return;

    const left = e.touches[0].clientX - offsetX;
    const top = e.touches[0].clientY - offsetY;

    card.style.left = left + "px";
    card.style.top = top + "px";
    card.style.transform = "none";

    rope.style.left = (left + card.offsetWidth / 2) + "px";
    rope.style.height = Math.max(40, top) + "px";

}, { passive: true });

document.addEventListener("touchend", () => {

    dragging = false;

});

/* เปลี่ยนหน้าอัตโนมัติหลัง 6 วินาที */

setTimeout(() => {

    window.location.href = "profile.html";

}, 6000);

</script>

</body>
